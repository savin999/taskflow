version: '3.8'

services:
  mongodb:
    image: mongo:7
    container_name: taskflow-mongodb
    ports:
      - '27017:27017'
    volumes:
      - mongodb_data:/data/db
    networks:
      - taskflow-network

  auth-service:
    build:
      context: ./auth-service
      dockerfile: Dockerfile
    container_name: taskflow-auth
    ports:
      - '3001:3001'
    environment:
      PORT: 3001
      MONGODB_URI: mongodb://mongodb:27017/taskflow
      JWT_SECRET: super_secret_jwt_key_taskflow_2025
      JWT_REFRESH_SECRET: super_secret_refresh_key_taskflow_2025
      JWT_EXPIRES_IN: 7d
      JWT_REFRESH_EXPIRES_IN: 7d
      GITHUB_CLIENT_ID: ${GITHUB_CLIENT_ID}
      GITHUB_CLIENT_SECRET: ${GITHUB_CLIENT_SECRET}
      GITHUB_CALLBACK_URL: http://localhost:3001/auth/github/callback
      FRONTEND_URL: http://localhost:3000
    depends_on:
      - mongodb
    networks:
      - taskflow-network

  task-service:
    build:
      context: ./task-service
      dockerfile: Dockerfile
    container_name: taskflow-tasks
    ports:
      - '3002:3002'
    environment:
      PORT: 3002
      MONGODB_URI: mongodb://mongodb:27017/taskflow
      JWT_SECRET: super_secret_jwt_key_taskflow_2025
      FRONTEND_URL: http://localhost:3000
    depends_on:
      - mongodb
    networks:
      - taskflow-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: taskflow-frontend
    ports:
      - '3000:3000'
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:3000
    depends_on:
      - auth-service
      - task-service
    networks:
      - taskflow-network

volumes:
  mongodb_data:

networks:
  taskflow-network:
    driver: bridge